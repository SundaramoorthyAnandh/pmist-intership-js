<!-- a sample form for students -->

<html>
  <head>
    <script src="./forms.js"></script>
  </head>
  <body>
    <form>
      <label for="name">Name:</label>
      <input type="text" id="name" name="name" />
      <br />
      <label for="mp">MP:</label>
      <input type="number" id="mp" name="mp" />
      <br />
      <input type="submit" value="Submit" onclick="getFormValues(event)" />

      <div>
        <h1>Student Details</h1>
        <h5>Name: <span id="studentName"></span></h5>
        <h5>MP: <span id="studentMP"></span></h5>
      </div>
    </form>
  </body>
</html>
